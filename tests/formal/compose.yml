name: chronicle-formal

x-runner-image: &runner-image
  build:
    context: .
    dockerfile: Dockerfile.runner

x-formal-environment: &formal-environment
  CHRONICLE_URL: http://chronicle:3000
  TOXIPROXY_URL: http://toxiproxy:8474
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: chronicle-formal
  S3_PREFIX: formal
  AWS_ACCESS_KEY_ID: chronicle-formal
  AWS_SECRET_ACCESS_KEY: chronicle-formal-secret
  AWS_REGION: us-east-1
  FORWARD_SECRET: chronicle-formal-forward-secret
  REPORT_DIR: /artifacts
  CHRONICLE_IMAGE: ${CHRONICLE_IMAGE:-forgejo.lan/protoman/chronicle:core-candidate-20260713-r5}

services:
  minio:
    image: minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: chronicle-formal
      MINIO_ROOT_PASSWORD: chronicle-formal-secret
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 2s
      retries: 30
      start_period: 2s

  minio-init:
    image: minio/mc@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - >-
        mc alias set formal http://minio:9000 chronicle-formal chronicle-formal-secret;
        mc mb --ignore-existing formal/chronicle-formal;
        mc anonymous set none formal/chronicle-formal
    depends_on:
      minio:
        condition: service_healthy

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy@sha256:9378ed52a28bc50edc1350f936f518f31fa95f0d15917d6eb40b8e376d1a214e
    command: ["-host=0.0.0.0", "-port=8474"]

  toxiproxy-init:
    <<: *runner-image
    command: ["node", "orchestrator/toxiproxy.mjs", "create"]
    environment: *formal-environment
    depends_on:
      minio-init:
        condition: service_completed_successfully
      toxiproxy:
        condition: service_started

  languagetool:
    <<: *runner-image
    command: ["node", "fixtures/languagetool-server.mjs"]
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8010/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 1s
      timeout: 2s
      retries: 20

  chronicle:
    image: ${CHRONICLE_IMAGE:-forgejo.lan/protoman/chronicle:core-candidate-20260713-r5}
    pull_policy: never
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /data
      AUTH_MODE: forward
      AUTH_FORWARD_TRUSTED_PROXIES: uniquelocal
      AUTH_FORWARD_SECRET_HEADER: X-Formal-Secret
      AUTH_FORWARD_SECRET: chronicle-formal-forward-secret
      STORAGE_REPLICA: s3
      STORAGE_RETRY_INTERVAL_MS: 250
      STORAGE_MAX_ATTEMPTS: 2
      S3_BUCKET: chronicle-formal
      S3_REGION: us-east-1
      S3_ENDPOINT: http://toxiproxy:8666
      S3_PREFIX: formal
      S3_FORCE_PATH_STYLE: "true"
      S3_ALLOW_INSECURE_HTTP: "true"
      AWS_ACCESS_KEY_ID: chronicle-formal
      AWS_SECRET_ACCESS_KEY: chronicle-formal-secret
      LANGUAGETOOL_URL: http://languagetool:8010
      LANGUAGETOOL_LANG: en-US
      AI_UI: "off"
    volumes:
      - chronicle-data:/data
    depends_on:
      toxiproxy-init:
        condition: service_completed_successfully
      languagetool:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/readyz"]
      interval: 1s
      timeout: 3s
      retries: 60
      start_period: 2s

  runner:
    <<: *runner-image
    environment: *formal-environment
    volumes:
      - ./artifacts:/artifacts
    depends_on:
      chronicle:
        condition: service_healthy

volumes:
  chronicle-data:
  minio-data:
