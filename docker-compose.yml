services:
  chronicle:
    build: .
    image: chronicle:latest
    container_name: chronicle
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - chronicle-data:/data
    environment:
      # Testbed auth: `none` for now so the browser works while we build OIDC
      # (Authelia) for both clients. AUTH_TOKEN kept for quick token-mode tests.
      - AUTH_MODE=none
      # The production image intentionally refuses unauthenticated non-loopback
      # binds unless this trusted-network opt-in is explicit.
      - ALLOW_INSECURE_NO_AUTH=true
      - AUTH_TOKEN=${AUTH_TOKEN}
      # Trust the Docker internal network and loopback (used by forward mode)
      - AUTH_FORWARD_TRUSTED_PROXIES=127.0.0.1,::1,172.16.0.0/12,10.0.0.0/8,192.168.0.0/16

      # AI settings (Sourced from .env)
      - GEMINI_API_KEY=${GEMINI_API_KEY}

      # The grammar engine (sidecar below). Chronicle PROBES this at runtime and
      # reports `host:languagetool` only when it answers — so without the
      # service, the built-in grammar check quietly finds nothing and the
      # Grammar Check / Tense Check / Proofreader plugins refuse to enable,
      # saying why. Keep the two together.
      - LANGUAGETOOL_URL=http://languagetool:8010
    depends_on:
      - languagetool

  # LanguageTool: the grammar/spelling engine (the one LibreOffice uses).
  # Internal only — Chronicle proxies it at /api/grammar/check and never exposes
  # it to the browser. ~700MB of JVM; drop this service (and the two lines
  # above) if you don't want spelling/grammar checking at all.
  languagetool:
    image: erikvl87/languagetool:latest
    container_name: chronicle-languagetool
    restart: unless-stopped
    environment:
      - Java_Xms=256m
      - Java_Xmx=768m

volumes:
  chronicle-data:
