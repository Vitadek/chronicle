name: GitHub Mirror CI

# Forgejo is Chronicle's canonical release authority and registry. This mirror
# intentionally performs read-only validation; it never publishes a competing
# GHCR `latest` image or bypasses the signed-tag release gate in .forgejo/.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the mirror
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run core gates
        run: |
          npm run lint
          npm run test:core
          npm run build
          npm audit --omit=dev --audit-level=high
