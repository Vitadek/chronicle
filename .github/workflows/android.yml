name: Build Android APK

# Sideload pipeline: builds a signed-for-debug release APK in Docker (same
# apk.Dockerfile as local builds) and attaches it to the GitHub Release on a
# v* tag. Also runnable on demand.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build APK in Docker (no host SDK)
        run: |
          docker build -f apk.Dockerfile --target export \
            --output type=local,dest=build-apk .

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronicle-apk
          path: build-apk/*.apk
          if-no-files-found: error

      - name: Attach APKs to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-apk/*.apk
